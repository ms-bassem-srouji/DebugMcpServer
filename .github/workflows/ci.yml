name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 'Test Results (${{ matrix.os }})'
          path: '**/test-results.trx'
          reporter: dotnet-trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'
          retention-days: 7

      - name: Generate Coverage Report
        if: matrix.os == 'ubuntu-latest'
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: 'coveragereport'
          reporttypes: 'JsonSummary'

      - name: Extract Coverage Percentage
        if: matrix.os == 'ubuntu-latest'
        id: coverage
        run: |
          COVERAGE=$(jq '.summary.linecoverage | floor' coveragereport/Summary.json)
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Update Coverage Badge
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: a158c95708696822a98f735f35d18eae
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          minColorRange: 0
          maxColorRange: 100

      - name: Pack (verify)
        run: dotnet pack src/DebugMcpServer/DebugMcpServer.csproj --no-build --configuration Release --output ./artifacts

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package-${{ matrix.os }}
          path: ./artifacts/*.nupkg
          retention-days: 7
